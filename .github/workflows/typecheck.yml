name: Type Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Build TypeScript (for workspace dependencies)
        run: bun run --filter ai-sdk-llama-cpp build:ts

      - name: Run type checks
        run: bun run typecheck
