name: Unit Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (includes native build)
        run: bun install

      - name: Build TypeScript
        run: bun run build:ts

      - name: Run unit tests
        run: bun run test:unit
